# Render deployment for Playtora. (Vercel is the active target — this file is unused.)
# NOTE: For production, change the datasource provider in prisma/schema.prisma from
# "sqlite" to "postgresql" and commit a Postgres migration before deploying.
databases:
  - name: playtora-db
    plan: free

services:
  - type: web
    name: playtora
    runtime: docker
    rootDir: ./Pad/playtora
    dockerfilePath: ./Pad/playtora/Dockerfile
    dockerContext: ./Pad/playtora
    healthCheckPath: /
    autoDeploy: true
    # Run migrations on each release before the new instance starts serving.
    preDeployCommand: npx prisma migrate deploy
    envVars:
      - key: NODE_ENV
        value: production
      - key: AUTH_TRUST_HOST
        value: "true"
      - key: AUTH_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: playtora-db
          property: connectionString
