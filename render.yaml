# Render deployment for Padelebi.
# NOTE: For production, change the datasource provider in prisma/schema.prisma from
# "sqlite" to "postgresql" and commit a Postgres migration before deploying.
databases:
  - name: padelebi-db
    plan: free

services:
  - type: web
    name: padelebi
    runtime: docker
    rootDir: ./Pad/padelebi
    dockerfilePath: ./Pad/padelebi/Dockerfile
    dockerContext: ./Pad/padelebi
    healthCheckPath: /
    autoDeploy: true
    # Run migrations on each release before the new instance starts serving.
    preDeployCommand: npx prisma migrate deploy
    envVars:
      - key: NODE_ENV
        value: production
      - key: AUTH_TRUST_HOST
        value: "true"
      - key: AUTH_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: padelebi-db
          property: connectionString
